function box(w, h, d, col, x, y, z, op) {
  op = (op === undefined) ? 1 : op;
  const m = new T.Mesh(new T.BoxGeometry(w, h, d),
    new T.MeshLambertMaterial({ color: col, transparent: op < 1, opacity: op }));
  m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}
function flat(w, d, col, x, z, y) {
  const m = new T.Mesh(new T.PlaneGeometry(w, d),
    new T.MeshLambertMaterial({ color: col }));
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, (y !== undefined) ? y : 0.01, z);
  m.receiveShadow = true; scene.add(m);
}
function cyl(r, h, col, x, y, z) {
  const m = new T.Mesh(new T.CylinderGeometry(r, r, h, 16),
    new T.MeshLambertMaterial({ color: col }));
  m.position.set(x, y, z); m.castShadow = true; scene.add(m); return m;
}

function wrkCol(w){return w==='overwhelmed'?0xdc2626:w==='heavy'?0xf97316:w==='moderate'?0x8b5cf6:0x3b82f6}
const SKIN_TONES=[0xfddbb4,0xf1c27d,0xe0ac69,0xc68642,0x8d5524,0x4a2512,0xffcba4,0xd4956a];
function skinTone(id){return SKIN_TONES[Math.abs(id*7+3)%SKIN_TONES.length];}
function slotPos(id,zone,zmap){const p=zmap[zone]||zmap[Object.keys(zmap)[0]];return p[Math.abs(id)%p.length]}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}

function buildPerson(col,skinCol=0xfddbb4){
  const g=new T.Group(), bm=new T.MeshLambertMaterial({color:col}), sm=new T.MeshLambertMaterial({color:skinCol});
  const lpL=new T.Group(); lpL.position.set(-0.13,0.7,0); g.add(lpL);
  const lpR=new T.Group(); lpR.position.set( 0.13,0.7,0); g.add(lpR);
  [lpL,lpR].forEach(lp=>{const m=new T.Mesh(new T.BoxGeometry(0.15,0.7,0.15),bm);m.position.y=-0.35;lp.add(m);});
  const apL=new T.Group(); apL.position.set(-0.3,1.25,0); g.add(apL);
  const apR=new T.Group(); apR.position.set( 0.3,1.25,0); g.add(apR);
  [apL,apR].forEach(ap=>{const m=new T.Mesh(new T.BoxGeometry(0.13,0.55,0.13),bm);m.position.y=-0.27;ap.add(m);});
  const torso=new T.Mesh(new T.BoxGeometry(0.44,0.65,0.26),bm); torso.position.set(0,1.02,0); g.add(torso);
  const head=new T.Mesh(new T.SphereGeometry(0.22,8,8),sm); head.position.set(0,1.55,0); g.add(head);
  return {g,bm,lpL,lpR,apL,apR};
}

function makeEntLabel(name,status,col,sub){
  const hex='#'+col.toString(16).padStart(6,'0');
  const el=document.createElement('div');
  el.className='entity-lbl';
  el.style.borderLeftColor=hex;
  el.innerHTML='<b style="font-size:11px;color:#1a1a1a">'+name+'</b>'
    +'<div style="font-size:10px;color:'+hex+'">● '+status+'</div>'
    +'<div style="font-size:9px;color:#666">'+sub+'</div>';
  labDiv.appendChild(el);
  return el;
}
function makeNameLabel(name,col){
  const hex='#'+col.toString(16).padStart(6,'0');
  const el=document.createElement('div');
  el.style.cssText='position:absolute;font:bold 10px sans-serif;color:'+hex+';text-shadow:0 1px 2px rgba(0,0,0,.7);white-space:nowrap;pointer-events:none;transition:opacity .15s;';
  el.textContent=name;
  labDiv.appendChild(el);
  return el;
}
function refreshEntLabel(el,name,status,col,sub){
  const hex='#'+col.toString(16).padStart(6,'0');
  el.style.borderLeftColor=hex;
  el.innerHTML='<b style="font-size:11px;color:#1a1a1a">'+name+'</b>'
    +'<div style="font-size:10px;color:'+hex+'">● '+status+'</div>'
    +'<div style="font-size:9px;color:#666">'+sub+'</div>';
}
function animSimEnts(map){
  map.forEach(ent=>{
    ent.cx+=(ent.tx-ent.cx)*0.06; ent.cz+=(ent.tz-ent.cz)*0.06;
    const ddx=ent.tx-ent.cx, ddz=ent.tz-ent.cz, mv=ddx*ddx+ddz*ddz>0.04;
    ent.ph+=mv?0.14:0.02;
    const sw=mv?Math.sin(ent.ph)*0.45:0;
    ent.lpL.rotation.x= sw; ent.lpR.rotation.x=-sw;
    ent.apL.rotation.x=-sw*0.5; ent.apR.rotation.x=sw*0.5;
    ent.g.position.set(ent.cx, mv?Math.abs(Math.sin(ent.ph))*0.04:0, ent.cz);
    if(mv) ent.g.rotation.y=Math.atan2(ddx,ddz);
    const lp=new T.Vector3(ent.cx,2.1,ent.cz).project(cam);
    const px=((lp.x+1)/2*W)+'px', py=((-lp.y+1)/2*H)+'px';
    const vis=lp.z<1;
    ent.el.style.transform='translate(-50%,-50%) translate('+px+','+py+')';
    ent.el.style.opacity=(ent.hovered&&vis)?'1':'0';
    ent.nel.style.transform='translate(-50%,-100%) translate('+px+','+py+')';
    ent.nel.style.opacity=(!ent.hovered&&vis)?'1':'0';
  });
}

// ── animated people ───────────────────────────────────────────────────────────
const people = [];
function makePerson(bodyCol, waypoints, speed, skinCol=0xfddbb4) {
  const g = new T.Group();
  const bm = new T.MeshLambertMaterial({ color: bodyCol });
  const sm = new T.MeshLambertMaterial({ color: skinCol });
  const lpL = new T.Group(); lpL.position.set(-0.13, 0.7, 0); g.add(lpL);
  const lpR = new T.Group(); lpR.position.set( 0.13, 0.7, 0); g.add(lpR);
  const legL = new T.Mesh(new T.BoxGeometry(0.15,0.7,0.15),bm); legL.position.y=-0.35; lpL.add(legL);
  const legR = new T.Mesh(new T.BoxGeometry(0.15,0.7,0.15),bm); legR.position.y=-0.35; lpR.add(legR);
  const apL = new T.Group(); apL.position.set(-0.3, 1.25, 0); g.add(apL);
  const apR = new T.Group(); apR.position.set( 0.3, 1.25, 0); g.add(apR);
  const armL = new T.Mesh(new T.BoxGeometry(0.13,0.55,0.13),bm); armL.position.y=-0.27; apL.add(armL);
  const armR = new T.Mesh(new T.BoxGeometry(0.13,0.55,0.13),bm); armR.position.y=-0.27; apR.add(armR);
  const torso = new T.Mesh(new T.BoxGeometry(0.44,0.65,0.26),bm); torso.position.set(0,1.02,0); g.add(torso);
  const head  = new T.Mesh(new T.SphereGeometry(0.22,8,8),sm);   head.position.set(0,1.55,0); g.add(head);
  g.position.set(waypoints[0][0], 0, waypoints[0][1]);
  scene.add(g);
  people.push({ g, lpL, lpR, apL, apR, waypoints, wpIdx:0,
    progress: Math.random(), speed: speed||(0.016+Math.random()*0.008),
    phase: Math.random()*Math.PI*2 });
}

// Ambient nurses (background atmosphere only — real agents populated from sim state)
makePerson(0xfafafa, [[-2,9],[2,9],[2,12],[-2,12]], 0.013, 0xc68642);
makePerson(0xfafafa, [[-12,-2],[12,-2],[12,2],[-12,2]], 0.017, 0xf1c27d);

// ── Real-time simulation state (postMessage from React) ──────────────────────
window.addEventListener('message', ev => {
  const msg = ev.data;
  if (!msg || msg.type !== 'sim_state') return;
  const pats = msg.patients || [], docs = msg.doctors || [];

  // Patients
  const pIds = new Set();
  pats.forEach(p => {
    if (p.location === 'deceased') return;
    pIds.add(p.id);
    const [tx, tz] = slotPos(p.id, p.location, P_ZONE);
    const col = sevCol(p.severity);
    const status = cap(p.severity);
    const sub = p.diagnosis || cap(p.condition);
    const fname = p.name ? p.name.split(' ')[0] : ('P' + p.id);
    if (!simPatients.has(p.id)) {
      const per = buildPerson(col, skinTone(p.id));
      per.g.position.set(tx, 0, tz); per.g.userData = { etype: 'patient', eid: p.id }; scene.add(per.g);
      simPatients.set(p.id, { ...per, el: makeEntLabel(fname, status, col, sub), nel: makeNameLabel(fname, col), tx, tz, cx: tx, cz: tz, ph: Math.random() * 6.28, hovered: false });
    } else {
      const e = simPatients.get(p.id);
      e.tx = tx; e.tz = tz; e.bm.color.setHex(col);
      e.nel.style.color='#'+col.toString(16).padStart(6,'0'); e.nel.textContent=fname;
      refreshEntLabel(e.el, fname, status, col, sub);
    }
  });
  simPatients.forEach((e, id) => { if (!pIds.has(id)) { scene.remove(e.g); e.el.remove(); e.nel.remove(); simPatients.delete(id); } });

  // Doctors
  const dIds = new Set();
  docs.forEach(d => {
    dIds.add(d.id);
    const [tx, tz] = slotPos(d.id, d.ward, D_ZONE);
    const col = wrkCol(d.workload);
    const status = cap(d.workload);
    const pts = (d.assigned_patient_ids || []).length;
    const cap2 = d.capacity || 3;
    const sub = d.specialty + ' · ' + pts + '/' + cap2 + ' pts';
    const dname = d.name || ('Doc ' + d.id);
    if (!simDoctors.has(d.id)) {
      const per = buildPerson(col, skinTone(d.id));
      per.g.position.set(tx, 0, tz); per.g.userData = { etype: 'doctor', eid: d.id }; scene.add(per.g);
      simDoctors.set(d.id, { ...per, el: makeEntLabel(dname, status, col, sub), nel: makeNameLabel(dname, col), tx, tz, cx: tx, cz: tz, ph: Math.random() * 6.28, hovered: false });
    } else {
      const e = simDoctors.get(d.id);
      e.tx = tx; e.tz = tz; e.bm.color.setHex(col);
      e.nel.style.color='#'+col.toString(16).padStart(6,'0'); e.nel.textContent=dname;
      refreshEntLabel(e.el, dname, status, col, sub);
    }
  });
  currentShortageTicks = msg.shortageTicks || 0;
  simDoctors.forEach((e, id) => {
    if (!dIds.has(id)) {
      if (currentShortageTicks > 0) {
        // Benched — walk to staff room
        const [bx, bz] = benchSlot(id);
        e.tx = bx; e.tz = bz;
        e.bm.color.setHex(0x9e9e9e);
      } else {
        scene.remove(e.g); e.el.remove(); e.nel.remove(); simDoctors.delete(id);
      }
    }
  });
});

// ── orbit ─────────────────────────────────────────────────────────────────────
let down=false, ox=0, oy=0, theta=0.38, phi=0.65, r=90, bt=0.38, bp=0.65;
let selId=null, selType=null;
const dom = renderer.domElement;
dom.addEventListener('mousedown', e => { down=true; ox=e.clientX; oy=e.clientY; bt=theta; bp=phi; });
dom.addEventListener('mousemove', e => {
  if (!down) return;
  theta = bt + (e.clientX-ox)*0.004;
  phi = Math.max(0.15, Math.min(1.4, bp-(e.clientY-oy)*0.004));
});
dom.addEventListener('mouseup', () => down=false);
dom.addEventListener('wheel', e => { r=Math.max(15,Math.min(160,r+e.deltaY*0.09)); }, { passive:true });

// ── Hover & click on simulation entities ──────────────────────────────────────
const raycaster = new T.Raycaster();
const mouse = new T.Vector2(-9, -9);
let hovId = null, hovType = null;

dom.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / W) * 2 - 1;
  mouse.y = -(e.clientY / H) * 2 + 1;
});
dom.addEventListener('click', e => {
  // Ignore drags
  if (Math.abs(e.clientX - ox) > 6 || Math.abs(e.clientY - oy) > 6) return;
  raycaster.setFromCamera(mouse, cam);
  const hits = raycaster.intersectObjects(scene.children, true);
  for (const h of hits) {
    let o = h.object;
    while (o) {
      if (o.userData?.eid != null) {
        selId = o.userData.eid; selType = o.userData.etype;
        const entMap = selType === 'patient' ? simPatients : simDoctors;
        const entData = entMap.get(selId);
        let nx = e.clientX / W, ny = e.clientY / H;
        if (entData) {
          const sp = new T.Vector3(entData.cx, 2.5, entData.cz).project(cam);
          nx = (sp.x+1)/2; ny = (-sp.y+1)/2;
        }
        window.parent.postMessage({ type: 'entity_click', entityType: selType, entityId: selId, nx, ny }, '*');
        return;
      }
      o = o.parent;
    }
  }
  // Clicked empty space — deselect
  selId = null; selType = null;
  window.parent.postMessage({ type: 'entity_deselect' }, '*');
});

(function loop() {
  requestAnimationFrame(loop);
  people.forEach(p => {
    const wps = p.waypoints;
    const from = wps[p.wpIdx];
    const next = wps[(p.wpIdx+1)%wps.length];
    const dx = next[0]-from[0], dz = next[1]-from[1];
    const dist = Math.sqrt(dx*dx+dz*dz) || 1;
    p.progress += p.speed/dist;
    if (p.progress >= 1) { p.progress -= 1; p.wpIdx = (p.wpIdx+1)%wps.length; }
    const t = p.progress;
    p.g.position.set(from[0]+dx*t, Math.abs(Math.sin(p.phase))*0.05, from[1]+dz*t);
    if (dx||dz) p.g.rotation.y = Math.atan2(dx, dz);
    p.phase += 0.16;
    const sw = Math.sin(p.phase)*0.5;
    p.lpL.rotation.x = sw; p.lpR.rotation.x = -sw;
    p.apL.rotation.x = -sw*0.5; p.apR.rotation.x = sw*0.5;
  });
  animSimEnts(simPatients);
  animSimEnts(simDoctors);
  // Per-frame hover highlight
  raycaster.setFromCamera(mouse, cam);
  const hv = raycaster.intersectObjects(scene.children, true);
  let nid = null, ntype = null;
  for (const h of hv) {
    let o = h.object;
    while (o) { if (o.userData?.eid != null) { nid=o.userData.eid; ntype=o.userData.etype; break; } o=o.parent; }
    if (nid !== null) break;
  }
  if (nid !== hovId || ntype !== hovType) {
    if (hovId !== null) {
      const oe = hovType==='patient' ? simPatients.get(hovId) : simDoctors.get(hovId);
      if (oe) { oe.g.scale.set(1,1,1); oe.el.style.boxShadow=''; oe.el.style.zIndex=''; oe.hovered=false; }
    }
    if (nid !== null) {
      const ne = ntype==='patient' ? simPatients.get(nid) : simDoctors.get(nid);
      if (ne) { ne.g.scale.set(1.3,1.3,1.3); ne.el.style.boxShadow='0 3px 14px rgba(0,0,0,.4)'; ne.el.style.zIndex='200'; ne.hovered=true; }
    }
    hovId=nid; hovType=ntype;
    if (!down) dom.style.cursor = nid!==null ? 'pointer' : '';
  }
  cam.position.set(r*Math.sin(theta)*Math.sin(phi), r*Math.cos(phi), r*Math.cos(theta)*Math.sin(phi));
  cam.lookAt(0, 2, 0);
  labs.forEach(({ el, pos }) => {
    const v = pos.clone().project(cam);
    el.style.transform = 'translate(-50%,-50%) translate('+((v.x+1)/2*W)+'px,'+((-v.y+1)/2*H)+'px)';
    el.style.opacity = v.z < 1 ? '1' : '0';
  });
  // Send selected entity's normalised screen position to parent every frame
  if (selId !== null) {
    const selMap = selType === 'patient' ? simPatients : simDoctors;
    const sel = selMap.get(selId);
    if (sel) {
      const sp = new T.Vector3(sel.cx, 2.5, sel.cz).project(cam);
      if (sp.z < 1) window.parent.postMessage({ type: 'entity_pos', nx: (sp.x+1)/2, ny: (-sp.y+1)/2 }, '*');
    }
  }
  renderer.render(scene, cam);
})();
</script>
</body>
