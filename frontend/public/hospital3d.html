function box(w, h, d, col, x, y, z, op) {
  op = (op === undefined) ? 1 : op;
  const m = new T.Mesh(new T.BoxGeometry(w, h, d),
    new T.MeshLambertMaterial({ color: col, transparent: op < 1, opacity: op }));
  m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}
function flat(w, d, col, x, z, y) {
  const m = new T.Mesh(new T.PlaneGeometry(w, d),
    new T.MeshLambertMaterial({ color: col }));
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, (y !== undefined) ? y : 0.01, z);
  m.receiveShadow = true; scene.add(m);
}
function cyl(r, h, col, x, y, z) {
  const m = new T.Mesh(new T.CylinderGeometry(r, r, h, 16),
    new T.MeshLambertMaterial({ color: col }));
  m.position.set(x, y, z); m.castShadow = true; scene.add(m); return m;
}

// ── animated people ───────────────────────────────────────────────────────────
const people = [];
function makePerson(bodyCol, waypoints, speed) {
  const g = new T.Group();
  const bm = new T.MeshLambertMaterial({ color: bodyCol });
  const sm = new T.MeshLambertMaterial({ color: 0xffccbc });
  const lpL = new T.Group(); lpL.position.set(-0.13, 0.7, 0); g.add(lpL);
  const lpR = new T.Group(); lpR.position.set( 0.13, 0.7, 0); g.add(lpR);
  const legL = new T.Mesh(new T.BoxGeometry(0.15,0.7,0.15),bm); legL.position.y=-0.35; lpL.add(legL);
  const legR = new T.Mesh(new T.BoxGeometry(0.15,0.7,0.15),bm); legR.position.y=-0.35; lpR.add(legR);
  const apL = new T.Group(); apL.position.set(-0.3, 1.25, 0); g.add(apL);
  const apR = new T.Group(); apR.position.set( 0.3, 1.25, 0); g.add(apR);
  const armL = new T.Mesh(new T.BoxGeometry(0.13,0.55,0.13),bm); armL.position.y=-0.27; apL.add(armL);
  const armR = new T.Mesh(new T.BoxGeometry(0.13,0.55,0.13),bm); armR.position.y=-0.27; apR.add(armR);
  const torso = new T.Mesh(new T.BoxGeometry(0.44,0.65,0.26),bm); torso.position.set(0,1.02,0); g.add(torso);
  const head  = new T.Mesh(new T.SphereGeometry(0.22,8,8),sm);   head.position.set(0,1.55,0); g.add(head);
  g.position.set(waypoints[0][0], 0, waypoints[0][1]);
  scene.add(g);
  people.push({ g, lpL, lpR, apL, apR, waypoints, wpIdx:0,
    progress: Math.random(), speed: speed||(0.016+Math.random()*0.008),
    phase: Math.random()*Math.PI*2 });
}

// Staff room - purple scrubs
makePerson(0x9575cd, [[-37,6],[-15,6],[-15,22],[-37,22]], 0.012);
makePerson(0x9575cd, [[-30,8],[-15,8],[-15,18],[-30,18]], 0.011);
// Patients waiting - pale blue gown
makePerson(0xb3d9ff, [[-5,12],[5,12],[5,18],[-5,18]], 0.011);
makePerson(0xb3d9ff, [[-4,13],[4,13],[4,17],[-4,17]], 0.009);
// Discharge patients - pale green gown
makePerson(0xc8e6c9, [[17,8],[37,8],[37,22],[17,22]], 0.012);
makePerson(0xc8e6c9, [[20,10],[35,10],[35,20],[20,20]], 0.014);

// ── orbit ─────────────────────────────────────────────────────────────────────
let down=false, ox=0, oy=0, theta=0.38, phi=0.65, r=90, bt=0.38, bp=0.65;
const dom = renderer.domElement;
dom.addEventListener('mousedown', e => { down=true; ox=e.clientX; oy=e.clientY; bt=theta; bp=phi; });
dom.addEventListener('mousemove', e => {
  if (!down) return;
  theta = bt + (e.clientX-ox)*0.004;
  phi = Math.max(0.15, Math.min(1.4, bp-(e.clientY-oy)*0.004));
});
dom.addEventListener('mouseup', () => down=false);
dom.addEventListener('wheel', e => { r=Math.max(15,Math.min(160,r+e.deltaY*0.09)); }, { passive:true });

(function loop() {
  requestAnimationFrame(loop);
  people.forEach(p => {
    const wps = p.waypoints;
    const from = wps[p.wpIdx];
    const next = wps[(p.wpIdx+1)%wps.length];
    const dx = next[0]-from[0], dz = next[1]-from[1];
    const dist = Math.sqrt(dx*dx+dz*dz) || 1;
    p.progress += p.speed/dist;
    if (p.progress >= 1) { p.progress -= 1; p.wpIdx = (p.wpIdx+1)%wps.length; }
    const t = p.progress;
    p.g.position.set(from[0]+dx*t, Math.abs(Math.sin(p.phase))*0.05, from[1]+dz*t);
    if (dx||dz) p.g.rotation.y = Math.atan2(dx, dz);
    p.phase += 0.16;
    const sw = Math.sin(p.phase)*0.5;
    p.lpL.rotation.x = sw; p.lpR.rotation.x = -sw;
    p.apL.rotation.x = -sw*0.5; p.apR.rotation.x = sw*0.5;
  });
  cam.position.set(r*Math.sin(theta)*Math.sin(phi), r*Math.cos(phi), r*Math.cos(theta)*Math.sin(phi));
  cam.lookAt(0, 2, 0);
  labs.forEach(({ el, pos }) => {
    const v = pos.clone().project(cam);
    el.style.transform = 'translate(-50%,-50%) translate('+((v.x+1)/2*W)+'px,'+((-v.y+1)/2*H)+'px)';
    el.style.opacity = v.z < 1 ? '1' : '0';
  });
  renderer.render(scene, cam);
})();
</script>
